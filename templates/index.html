<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* Calm Professional Theme */
        body { 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #333; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10; color: white; 
        }
        
        .main-layout { display: flex; gap: 40px; align-items: center; margin-top: 50px; }
        
        .score-box { 
            background: #ffffff; padding: 25px; border-radius: 20px; 
            text-align: center; width: 140px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            color: #4a6fa5; font-weight: bold;
        }
        
        .grid { 
            display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; 
            background: #e9ecef; padding: 15px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .cell { 
            width: 100px; height: 100px; background: #ffffff; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3em; cursor: pointer; transition: 0.2s;
        }
        
        .cell:hover { background: #f8f9fa; }
        
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        
        button { 
            padding: 10px 25px; font-size: 1.1em; cursor: pointer; 
            border-radius: 10px; border: none; background: #4a6fa5; color: white;
            transition: 0.2s;
        }
        
        button:hover { background: #335480; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Welcome to Tic-Tac-Toe</h1>
        <input id="p1" placeholder="Player 1 Name">
        <input id="p2" placeholder="Player 2 Name">
        <button onclick="startGame()">Start Game</button>
    </div>

    <div class="main-layout">
        <div class="score-box">
            <div id="name1">Player 1</div>
            Score: <h2 id="scoreX">0</h2>
        </div>
        
        <div class="grid" id="board"></div>
        
        <div class="score-box">
            <div id="name2">Player 2</div>
            Score: <h2 id="scoreO">0</h2>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        function startGame() {
            document.getElementById('name1').innerText = document.getElementById('p1').value || "Player 1";
            document.getElementById('name2').innerText = document.getElementById('p2').value || "Player 2";
            document.getElementById('overlay').style.display = 'none';
        }
        
        const board = document.getElementById('board');
        for(let i=0; i<9; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.onclick = () => socket.emit('make_move', {index: i});
            board.appendChild(div);
        }
        
        socket.on('update_board', (data) => {
            const cells = document.querySelectorAll('.cell');
            data.board.forEach((val, i) => cells[i].innerText = val);
        });
        
        socket.on('game_over', (data) => {
            alert("Game Over! Result: " + data.winner);
            document.getElementById('scoreX').innerText = data.scores.X;
            document.getElementById('scoreO').innerText = data.scores.O;
        });
    </script>
</body>
</html>
