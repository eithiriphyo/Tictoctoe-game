<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background-color: #c02d2d; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; color: white; margin: 0; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
        .main-layout { display: flex; gap: 40px; align-items: center; margin-top: 50px; }
        .score-box { background: #ff6600; padding: 25px; border-radius: 20px; text-align: center; width: 140px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; background: #d2a679; padding: 15px; border-radius: 20px; }
        .cell { width: 100px; height: 100px; background: #964b00; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 3em; cursor: pointer; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; border-radius: 10px; border: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Welcome!</h1>
        <input id="p1" placeholder="Player 1 Name">
        <input id="p2" placeholder="Player 2 Name">
        <button onclick="startGame()">Start Game</button>
    </div>

    <div class="main-layout">
        <div class="score-box"><div id="name1">Player 1</div>Score: <h2 id="scoreX">0</h2></div>
        <div class="grid" id="board"></div>
        <div class="score-box"><div id="name2">Player 2</div>Score: <h2 id="scoreO">0</h2></div>
    </div>
    
    <script>
        const socket = io();
        function startGame() {
            document.getElementById('name1').innerText = document.getElementById('p1').value || "Player 1";
            document.getElementById('name2').innerText = document.getElementById('p2').value || "Player 2";
            document.getElementById('overlay').style.display = 'none';
        }
        const board = document.getElementById('board');
        for(let i=0; i<9; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.onclick = () => socket.emit('make_move', {index: i});
            board.appendChild(div);
        }
        socket.on('update_board', (data) => {
            const cells = document.querySelectorAll('.cell');
            data.board.forEach((val, i) => cells[i].innerText = val);
        });
        socket.on('game_over', (data) => {
            alert("Game Over! Result: " + data.winner);
            document.getElementById('scoreX').innerText = data.scores.X;
            document.getElementById('scoreO').innerText = data.scores.O;
        });
    </script>
</body>
</html>
